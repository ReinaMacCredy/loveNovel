name: LoveNovel
options:
  bundleIdPrefix: com.reinamaccredy
  deploymentTarget:
    iOS: "26.0"
settings:
  base:
    SWIFT_VERSION: 6.0
    SWIFT_STRICT_CONCURRENCY: complete
    TARGETED_DEVICE_FAMILY: 1
    SUPPORTS_MACCATALYST: NO
    SWIFT_EMIT_LOC_STRINGS: NO
targetTemplates:
  iosModule:
    type: framework
    platform: iOS
    deploymentTarget: "26.0"
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES
targets:
  LoveNovelCore:
    templates:
      - iosModule
    sources:
      - path: LoveNovel/App
        includes:
          - AppLocalization.swift
          - AppSettings.swift
          - LeftEdgeSwipeUpBackModifier.swift
      - path: LoveNovel/Theme
      - path: LoveNovel/Core/Contracts
      - path: LoveNovel/en.lproj
        buildPhase: resources
      - path: LoveNovel/vi.lproj
        buildPhase: resources

  LoveNovelDomain:
    templates:
      - iosModule
    sources:
      - path: LoveNovel/Domain
    dependencies:
      - target: LoveNovelCore

  LoveNovelData:
    templates:
      - iosModule
    sources:
      - path: LoveNovel/Data
    dependencies:
      - target: LoveNovelDomain

  LoveNovelPresentation:
    templates:
      - iosModule
    sources:
      - path: LoveNovel/Presentation
      - path: LoveNovel/App
        includes:
          - AppChapterTitleFormatter.swift
          - RootTabView.swift
          - UITestBootstrap.swift
      - path: LoveNovel/Core/DI
        includes:
          - AppContainer.swift
          - FeatureFactories.swift
    dependencies:
      - target: LoveNovelCore
      - target: LoveNovelDomain
      - target: LoveNovelData

  LoveNovel:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: LoveNovel/LoveNovelApp.swift
      - path: LoveNovel/Assets.xcassets
        buildPhase: resources
      - path: LoveNovel/Resources
        buildPhase: resources
      - path: LoveNovel/en.lproj
        buildPhase: resources
      - path: LoveNovel/vi.lproj
        buildPhase: resources
      - path: LoveNovel/Preview Content/Preview Assets.xcassets
        buildPhase: resources
    dependencies:
      - target: LoveNovelPresentation
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.reinamaccredy.lovenovel
        INFOPLIST_FILE: LoveNovel/Info.plist
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        DEVELOPMENT_ASSET_PATHS: "\"LoveNovel/Preview Content\""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
    scheme:
      testTargets:
        - LoveNovelTests
        - LoveNovelUITests

  LoveNovelTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - LoveNovelTests
    dependencies:
      - target: LoveNovelCore
      - target: LoveNovelDomain
      - target: LoveNovelData
      - target: LoveNovelPresentation
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.reinamaccredy.lovenovel.tests
        INFOPLIST_FILE: LoveNovelTests/Info.plist
        GENERATE_INFOPLIST_FILE: NO

  LoveNovelUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - LoveNovelUITests
    dependencies:
      - target: LoveNovel
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.reinamaccredy.lovenovel.uitests
        INFOPLIST_FILE: LoveNovelUITests/Info.plist
        GENERATE_INFOPLIST_FILE: NO
